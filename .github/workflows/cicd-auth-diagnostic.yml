name: cicd-auth-diagnostic

on:
  workflow_dispatch:
  push:
    branches:
      - 'diagnostic/cicd-auth-proof'
    paths:
      - '.github/workflows/cicd-auth-diagnostic.yml'
      - '.github/workflows/cicd-auth-diagnostic.ps1'
      - '.github/workflows/cicd-publish-release-smoke.ps1'
      - 'source/Eigenverft.Manifested.Drydock/**'

permissions:
  contents: read
  packages: write

jobs:
  authenticate:
    name: Auth proof (${{ matrix.os }}, installed pwsh)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run isolated authentication proof
        shell: pwsh
        run: >-
          .github/workflows/cicd-auth-diagnostic.ps1
          -NuGetGitHubPush "${{ github.token }}"
          -GitHubPackagesUser "eigenverft"
          -GitHubSourceUri "https://nuget.pkg.github.com/eigenverft/index.json"

      - name: Upload diagnostic JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cicd-auth-diagnostic-${{ matrix.os }}-installed
          path: ${{ runner.temp }}/cicd-auth-diagnostic.json
          if-no-files-found: warn
          retention-days: 14

  powershell-74-isolation:
    name: Auth proof (${{ matrix.os }}, PowerShell 7.4.14)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and verify official PowerShell 7.4.14 portable release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseBase = 'https://github.com/PowerShell/PowerShell/releases/download/v7.4.14'
          $archiveName = 'PowerShell-7.4.14-win-x64.zip'
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $hashesPath = Join-Path $env:RUNNER_TEMP 'powershell-7.4.14-hashes.sha256'
          $targetPath = Join-Path $env:RUNNER_TEMP 'pwsh-7.4.14'

          Invoke-WebRequest -Uri "$releaseBase/$archiveName" -OutFile $archivePath
          Invoke-WebRequest -Uri "$releaseBase/hashes.sha256" -OutFile $hashesPath

          $hashLine = Get-Content $hashesPath | Where-Object { $_ -match [regex]::Escape($archiveName) } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($hashLine)) {
              throw "No SHA-256 entry found for $archiveName."
          }

          $expectedHash = ($hashLine -split '\s+')[0].Trim().ToLowerInvariant()
          $actualHash = (Get-FileHash -Path $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
              throw "SHA-256 mismatch for $archiveName. Expected $expectedHash, got $actualHash."
          }

          Expand-Archive -Path $archivePath -DestinationPath $targetPath -Force
          & (Join-Path $targetPath 'pwsh.exe') -NoLogo -NoProfile -Command '$PSVersionTable'

      - name: Run proof under PowerShell 7.4.14
        shell: pwsh
        run: |
          $pwsh74 = Join-Path $env:RUNNER_TEMP 'pwsh-7.4.14\pwsh.exe'
          $resultPath = Join-Path $env:RUNNER_TEMP 'cicd-auth-diagnostic-ps74.json'
          & $pwsh74 -NoLogo -NoProfile -File '.github/workflows/cicd-auth-diagnostic.ps1' `
              -NuGetGitHubPush '${{ github.token }}' `
              -GitHubPackagesUser 'eigenverft' `
              -GitHubSourceUri 'https://nuget.pkg.github.com/eigenverft/index.json' `
              -ResultPath $resultPath `
              -DoNotFailOnUnexpected
          if ($LASTEXITCODE -ne 0) {
              throw "PowerShell 7.4.14 diagnostic exited with code $LASTEXITCODE."
          }

      - name: Upload PowerShell 7.4.14 diagnostic JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cicd-auth-diagnostic-${{ matrix.os }}-ps74
          path: ${{ runner.temp }}/cicd-auth-diagnostic-ps74.json
          if-no-files-found: warn
          retention-days: 14

  runtime-module-cross-test:
    name: Cross test (${{ matrix.label }})
    runs-on: windows-2025
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: pwsh-7.6-with-7.4-modules
            runtime: installed
            modules: portable
          - label: pwsh-7.4-with-7.6-modules
            runtime: portable
            modules: installed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and verify official PowerShell 7.4.14 portable release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseBase = 'https://github.com/PowerShell/PowerShell/releases/download/v7.4.14'
          $archiveName = 'PowerShell-7.4.14-win-x64.zip'
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $hashesPath = Join-Path $env:RUNNER_TEMP 'powershell-7.4.14-hashes.sha256'
          $targetPath = Join-Path $env:RUNNER_TEMP 'pwsh-7.4.14'

          Invoke-WebRequest -Uri "$releaseBase/$archiveName" -OutFile $archivePath
          Invoke-WebRequest -Uri "$releaseBase/hashes.sha256" -OutFile $hashesPath
          $hashLine = Get-Content $hashesPath | Where-Object { $_ -match [regex]::Escape($archiveName) } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($hashLine)) {
              throw "No SHA-256 entry found for $archiveName."
          }
          $expectedHash = ($hashLine -split '\s+')[0].Trim().ToLowerInvariant()
          $actualHash = (Get-FileHash -Path $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
              throw "SHA-256 mismatch for $archiveName. Expected $expectedHash, got $actualHash."
          }
          Expand-Archive -Path $archivePath -DestinationPath $targetPath -Force

      - name: Run runtime/module cross test
        shell: pwsh
        run: |
          $portableRoot = Join-Path $env:RUNNER_TEMP 'pwsh-7.4.14'
          $installedRoot = $PSHOME
          $runtimeChoice = '${{ matrix.runtime }}'
          $moduleChoice = '${{ matrix.modules }}'
          $label = '${{ matrix.label }}'

          $runtimeExe = if ($runtimeChoice -eq 'portable') {
              Join-Path $portableRoot 'pwsh.exe'
          }
          else {
              Join-Path $installedRoot 'pwsh.exe'
          }

          $moduleRoot = if ($moduleChoice -eq 'portable') { $portableRoot } else { $installedRoot }
          $packageManagementPath = Join-Path $moduleRoot 'Modules\PackageManagement\PackageManagement.psd1'
          $powerShellGetPath = Join-Path $moduleRoot 'Modules\PowerShellGet\PowerShellGet.psd1'
          $resultPath = Join-Path $env:RUNNER_TEMP "cicd-auth-diagnostic-$label.json"

          & $runtimeExe -NoLogo -NoProfile -File '.github/workflows/cicd-auth-diagnostic.ps1' `
              -NuGetGitHubPush '${{ github.token }}' `
              -GitHubPackagesUser 'eigenverft' `
              -GitHubSourceUri 'https://nuget.pkg.github.com/eigenverft/index.json' `
              -ResultPath $resultPath `
              -PackageManagementModulePath $packageManagementPath `
              -PowerShellGetModulePath $powerShellGetPath `
              -DoNotFailOnUnexpected
          if ($LASTEXITCODE -ne 0) {
              throw "Cross diagnostic '$label' exited with code $LASTEXITCODE."
          }

      - name: Upload cross-test diagnostic JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cicd-auth-diagnostic-${{ matrix.label }}
          path: ${{ runner.temp }}/cicd-auth-diagnostic-${{ matrix.label }}.json
          if-no-files-found: warn
          retention-days: 14

  publish-release-smoke:
    name: Publish release smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse publish smoke script with PowerShell 7
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path '.github/workflows/cicd-publish-release-smoke.ps1'),
              [ref]$tokens,
              [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) { throw ($errors | Out-String) }

      - name: Parse publish smoke script with Windows PowerShell 5.1
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path '.github/workflows/cicd-publish-release-smoke.ps1'),
              [ref]$tokens,
              [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) { throw ($errors | Out-String) }

      - name: Run local publish abstraction smoke test with PowerShell 7
        shell: pwsh
        run: .github/workflows/cicd-publish-release-smoke.ps1

      - name: Run local publish abstraction smoke test with Windows PowerShell 5.1
        if: always()
        shell: powershell
        run: .github/workflows/cicd-publish-release-smoke.ps1
